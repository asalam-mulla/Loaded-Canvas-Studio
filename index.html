<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <!-- Primary SEO -->
  <title>Studio — Original Paintings & Collections</title>
  <meta name="description"
    content="A curated digital gallery of original paintings — collections, exhibitions, and the story behind the work." />
  <meta name="theme-color" content="#F2EEE6" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#14131A" media="(prefers-color-scheme: dark)" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Studio — Original Paintings & Collections" />
  <meta property="og:description"
    content="A curated digital gallery of original paintings — collections, exhibitions, and the story behind the work." />

  <!-- Fonts: Fraunces (display), Inter (body), IBM Plex Mono (placard/caption) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
    rel="stylesheet" />

  <!-- Prevents a flash of the wrong theme before React hydrates -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem("gallery-theme");
        var theme =
          stored || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "light");
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
